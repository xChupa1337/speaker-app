# CI/CD Pipeline for Speaker App Backend
# Node.js 20 + TypeScript + Express + MongoDB

stages:
  - build
  - test
  - docker
  - deploy

variables:
  APP_NAME: "speaker-app-backend"
  # Додаємо змінні для тестів (оскільки .env.test.local не пушиться в гіт)
  BASE_URL: "/api/v1"
  JWT_SECRET: "test-jwt-secret-for-testing-only-not-production"
  PORT: "3001"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - speaker-app-backend/node_modules/

# Stage: BUILD
node_build:
  stage: build
  tags:
    - student
  script:
    - cd speaker-app-backend
    - npm ci
    - npm run build
    - dir dist
  artifacts:
    paths:
      - speaker-app-backend/dist/
      - speaker-app-backend/node_modules/
    expire_in: 1 hour
  rules:
    - if: "$CI_COMMIT_BRANCH"
      when: always

# Stage: TEST - unit and integration tests with coverage
node_test:
  stage: test
  tags:
    - student
  dependencies:
    - node_build
  script:
    - cd speaker-app-backend
    - npm run test:coverage
  coverage: '/Statements\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    paths:
      - speaker-app-backend/coverage/
    expire_in: 7 days
    reports:
      coverage_report:
        coverage_format: cobertura
        path: speaker-app-backend/coverage/cobertura-coverage.xml
  rules:
    - if: "$CI_COMMIT_BRANCH"
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

# Stage: TEST - TypeScript type checking
node_lint:
  stage: test
  tags:
    - student
  dependencies:
    - node_build
  script:
    - cd speaker-app-backend
    - npx tsc --noEmit
    - echo "TypeScript type check passed!"
  allow_failure: false
  rules:
    - if: "$CI_COMMIT_BRANCH"
      when: always

# Stage: DOCKER - build Docker image (Skipped for shell executor)
docker_build:
  stage: docker
  tags:
    - student
  script:
    - echo "Skipping Docker build because we are using shell executor"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: always

# Stage: DEPLOY - simulated deploy (only for main branch)
deploy_staging:
  stage: deploy
  tags:
    - student
  script:
    - echo "Deploying $APP_NAME to staging"
    - echo "Branch $CI_COMMIT_BRANCH"
    - echo "Commit $CI_COMMIT_SHORT_SHA"
    - echo "Deploy SIMULATED OK"
  environment:
    name: staging
    url: https://speaker-app.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
